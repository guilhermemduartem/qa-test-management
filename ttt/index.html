<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Orion – Cadastros e Consulta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #1a1a2e;
      --panel-2: #16213e;
      --muted: #8b8b9c;
      --text: #f8f9ff;
      --brand: #6366f1;
      --ok: #10b981;
      --warn: #f59e0b;
      --bad: #ef4444;
      --soft: #0a0a0fcc;
      --line: #2d2d44;
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-dark: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif
    }

    body {
      background: var(--gradient-dark);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr !important;
      min-height: 100vh;
      background: var(--gradient-dark)
    }

    /* Sidebar */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 320px !important;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border-right: 2px solid var(--line);
      padding: 24px;
      box-shadow: var(--shadow-lg)
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      backdrop-filter: blur(10px)
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--gradient-primary);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-md)
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px
    }

    .muted {
      color: var(--muted);
      font-weight: 500
    }

    .search {
      position: relative;
      margin: 20px 0 24px
    }

    .search input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease
    }

    .search input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1)
    }

    .search svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.7;
      width: 18px;
      height: 18px
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .menu button,
    .submenu button {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border: 0;
      background: transparent;
      border-radius: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden
    }

    .menu button:hover,
    .submenu button:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateX(4px)
    }

    .menu button:active,
    .submenu button:active {
      transform: scale(0.98)
    }

    .submenu {
      margin: 8px 0 16px 16px;
      border-left: 3px solid var(--brand);
      padding-left: 12px;
      display: none;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease
    }

    .submenu.open {
      display: block;
      opacity: 1;
      transform: translateY(0)
    }

    .submenu button {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px
    }

    .pill {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--gradient-secondary);
      color: white;
      font-weight: 600;
      box-shadow: var(--shadow-sm)
    }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 2px solid var(--line);
      backdrop-filter: blur(20px);
      background: rgba(26, 26, 46, 0.8);
      position: sticky;
      top: 0;
      z-index: 10
    }

    .topbar .toggle {
      display: none;
      background: var(--gradient-primary);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer
    }

    /* Content */
    .content {
      padding: 24px;
      background: var(--gradient-dark)
    }

    .grid {
      display: grid;
      gap: 20px
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3)
    }

    .card h2 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .card h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 12px;
      color: var(--text)
    }

    .kpi {
      font-size: 32px;
      font-weight: 900;
      margin: 8px 0
    }

    .kpi.ok {
      background: var(--gradient-secondary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .kpi.warn {
      color: var(--warn)
    }

    .kpi.bad {
      color: var(--bad)
    }

    /* Forms */
    .form {
      display: grid;
      gap: 16px;
      max-width: 900px
    }

    .row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px
    }

    .row>.col-6 {
      grid-column: span 6
    }

    .row>.col-4 {
      grid-column: span 4
    }

    .row>.col-3 {
      grid-column: span 3
    }

    .row>.col-12 {
      grid-column: span 12
    }

    label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
      display: block
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 14px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px)
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      transform: translateY(-2px)
    }

    select option {
      background: #1e293b !important;
      color: #f1f5f9 !important;
      padding: 8px;
    }

    textarea {
      min-height: 100px;
      resize: vertical
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 8px
    }

    .btn {
      padding: 12px 20px;
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px)
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md)
    }

    .btn.primary {
      background: var(--gradient-primary);
      border: 0;
      color: white;
      box-shadow: var(--shadow-md)
    }

    .btn.ghost {
      background: transparent;
      border-color: transparent
    }

    /* Table */
    .table-wrap {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      max-width: 100%;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px)
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(26, 26, 46, 0.95);
      border-bottom: 2px solid var(--line);
      padding: 16px 12px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      backdrop-filter: blur(10px)
    }

    tbody td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      vertical-align: middle;
      text-align: center;
      transition: all 0.3s ease
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
      transform: scale(1.01)
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
      backdrop-filter: blur(10px)
    }

    .P0 {
      color: white;
      background: var(--gradient-primary);
      border: 0;
      box-shadow: var(--shadow-sm)
    }

    .P1 {
      color: white;
      background: var(--gradient-secondary);
      border: 0;
      box-shadow: var(--shadow-sm)
    }

    .P2 {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--muted)
    }

    .P3 {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--muted);
      color: var(--muted)
    }

    /* Cores para Status */
    .status.Não-iniciada {
      color: white;
      background: linear-gradient(135deg, #6b7280, #9ca3af);
      border: 0
    }

    .status.Em-Correção {
      color: white;
      background: linear-gradient(135deg, #ef4444, #f87171);
      border: 0
    }

    .status.Aguardando-Aprovação {
      color: white;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      border: 0
    }

    .status.Em-Teste {
      color: white;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      border: 0
    }

    .status.Concluída {
      color: white;
      background: linear-gradient(135deg, #10b981, #34d399);
      border: 0
    }

    .status.Bloqueada {
      color: white;
      background: linear-gradient(135deg, #dc2626, #ef4444);
      border: 0
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      border: 1px solid var(--line);
      backdrop-filter: blur(10px)
    }

    .toolbar .spacer {
      flex: 1
    }

    /* Checkbox inline styles */
    .checkbox-inline:hover {
      background: rgba(255, 255, 255, 0.05)
    }

    .checkbox-inline input[type="checkbox"] {
      accent-color: var(--brand)
    }



    .empty {
      padding: 40px;
      color: var(--muted);
      text-align: center;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      border: 2px dashed var(--line)
    }

    /* Validador de NF Styles */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .header h1 {
      font-size: 2.5em;
      font-weight: 800;
      margin-bottom: 10px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--muted);
      font-size: 1.1em;
    }

    .info-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .info-panel h3 {
      margin: 0 0 20px;
      font-size: 1.3em;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .info-item {
      text-align: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid var(--line);
    }

    .info-item h4 {
      font-size: 0.9em;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .info-item p {
      font-size: 1.2em;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }

    .upload-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .upload-section h3 {
      margin: 0 0 20px;
      font-size: 1.3em;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .upload-controls {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .custom-file-upload {
      display: inline-block;
      padding: 14px 24px;
      background: var(--gradient-primary);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      box-shadow: var(--shadow-md);
    }

    .custom-file-upload:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .custom-file-upload input[type="file"] {
      display: none;
    }

    /* Responsive */
    @media(max-width: 1200px) {
      .app {
        grid-template-columns: 320px 1fr !important
      }

      .sidebar {
        padding: 20px;
        width: 320px !important
      }

      .content {
        padding: 20px
      }
    }

    @media(max-width: 980px) {
      .app {
        grid-template-columns: 320px 1fr !important
      }

      .sidebar {
        position: sticky;
        left: 0;
        top: 0;
        width: 320px !important;
        z-index: 1000
      }

      .sidebar.open {
        left: 0
      }

      .topbar .toggle {
        display: none
      }

      .content {
        padding: 16px
      }

      .cards {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr))
      }
    }

    @media(max-width: 768px) {
      .app {
        grid-template-columns: 320px 1fr !important
      }

      .sidebar {
        width: 320px !important
      }

      .row {
        grid-template-columns: repeat(12, 1fr)
      }

      .row>.col-6,
      .row>.col-4,
      .row>.col-3 {
        grid-column: span 6
      }

      .toolbar {
        flex-direction: row
      }

      .actions {
        flex-direction: row
      }
    }

    /* Motor de Busca Styles */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    .linha-topo {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .linha-topo label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      grid-column: span 4;
    }

    .linha-topo label span {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .quarto {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .quarto:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .quarto h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 12px;
      color: var(--text);
      text-align: center;
    }

    .linha-adultos-criancas {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: center;
      margin-bottom: 20px;
    }

    .linha-adultos-criancas label {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .linha-adultos-criancas label span {
      font-weight: 600;
      color: #94a3b8;
      font-size: 0.9em;
    }

    .idades {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      padding: 25px;
      background: linear-gradient(145deg, rgba(59, 130, 246, 0.08), rgba(59, 130, 246, 0.12));
      border-radius: 16px;
      border: 1px solid rgba(59, 130, 246, 0.15);
      position: relative;
      overflow: hidden;
    }

    .idades::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #1d4ed8);
    }

    .child-age-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: linear-gradient(145deg, #334155, #475569);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      border: 1px solid rgba(59, 130, 246, 0.2);
      min-width: 140px;
      position: relative;
      overflow: hidden;
    }

    .child-age-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #3b82f6, #1d4ed8);
    }

    .child-age-container:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
      border-color: rgba(59, 130, 246, 0.4);
    }

    .child-age-container label {
      font-weight: 700;
      color: #f1f5f9;
      font-size: 1em;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.5px;
    }

    .child-age-container input {
      padding: 12px 16px;
      border: 2px solid #475569;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      transition: all 0.3s ease;
      background: linear-gradient(145deg, #1e293b, #334155);
      color: #f1f5f9;
      width: 80px;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .child-age-container input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), inset 0 2px 4px rgba(0, 0, 0, 0.2);
      transform: scale(1.05);
    }

    .child-age-container input.invalid {
      border-color: #ef4444;
      background: linear-gradient(145deg, #7f1d1d, #991b1b);
      color: #fca5a5;
      animation: shake 0.5s ease-in-out;
    }

    .child-age-container input.invalid:focus {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2), inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .child-age-container input.invalid::placeholder {
      color: #fca5a5;
      font-size: 12px;
    }

    .child-age-container .error-message {
      color: #ef4444;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      padding: 4px 8px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 6px;
      border: 1px solid rgba(239, 68, 68, 0.3);
      animation: fadeIn 0.3s ease-in;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      display: none;
      position: relative;
      z-index: 10;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .child-age-container input::-webkit-inner-spin-button,
    .child-age-container input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .child-age-container input[type=number] {
      -moz-appearance: textfield;
    }

    .botoes-container {
      display: flex !important;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      margin-bottom: 30px;
      visibility: visible !important;
      opacity: 1 !important;
      z-index: 1000;
    }

    .botoes-container button {
      padding: 12px 20px;
      background: var(--gradient-primary);
      border: 0;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      font-size: 14px;
      min-width: 150px;
      box-shadow: var(--shadow-md);
    }

    .botoes-container button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .credenciais-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .credenciais-titulo {
      margin: 0 0 20px;
      font-size: 1.3em;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .credenciais-campos {
      display: flex;
      justify-content: center;
      gap: 30px;
      max-width: 600px;
      margin: 0 auto;
    }

    .credenciais-campos label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      max-width: 280px;
    }

    .credenciais-campos label span {
      font-weight: 600;
      color: #94a3b8;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: left;
    }

    .credenciais-campos input {
      padding: 12px 16px;
      border: 2px solid #475569;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #1e293b;
      color: #f1f5f9;
      width: 100%;
    }

    .credenciais-campos input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
      transform: translateY(-2px);
    }

    .credenciais-campos input::placeholder {
      color: #64748b;
    }

    .btn-adicionar {
      padding: 12px 20px;
      background: var(--gradient-secondary);
      border: 0;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      font-size: 14px;
      margin: 20px auto 0;
      width: 100%;
      max-width: 200px;
      display: block;
      box-shadow: var(--shadow-md);
    }

    .btn-adicionar:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .cenario {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 30px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .cenario:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .cenario-header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(59, 130, 246, 0.2);
    }

    .cenario-titulo {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .quarto.limite-alcançado {
      border-color: #ef4444;
      background: linear-gradient(145deg, #7f1d1d, #991b1b);
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
      animation: pulse 2s infinite;
    }

    .quarto.limite-alcançado::before {
      background: linear-gradient(90deg, #ef4444, #dc2626);
    }

    .quarto.limite-alcançado h3 {
      color: #fca5a5;
    }

    .quarto.limite-alcançado::after {
      content: 'Limite Atingido';
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: 600;
      animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: translateY(-5px); }
      50% { transform: translateY(-3px); }
    }

    .quarto.limite-alcançado:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(245, 101, 101, 0.3);
    }
  </style>
</head>

  <template id="tpl-dashboard">

  <template id="tpl-cad-pessoas">
    <div class="card">
      <h2 style="margin:0 0 8px">Cadastro de Pessoas</h2>

        <div class="row">
          <div class="col-4"><label>Nome</label><input required id="pessoa-nome" type="text" placeholder="Ex.: Lucas" />
          </div>
          <div class="col-4"><label>Cargo</label><input required id="pessoa-cargo" type="text"
              placeholder="Ex.: Desenvolvedor" /></div>
          <div class="col-4"><label>Email (opcional)</label><input id="pessoa-email" type="email"
              placeholder="nome@empresa.com" /></div>
          <div class="col-12 actions"><button class="btn primary" type="submit">Adicionar</button><button
              class="btn ghost" type="reset">Limpar</button><button class="btn" type="button" id="btn-cancelar-edicao"
              style="display:none">Cancelar Edição</button></div>
        </div>
      </form>
    </div>
    <div class="card">
      <h3 style="margin:0 0 8px">Pessoas cadastradas</h3>
      <div id="lista-pessoas" class="empty">Nenhuma pessoa cadastrada.</div>
    </div>
  </template>

  <template id="tpl-cad-projetos">
    <div class="card">
      <h2 style="margin:0 0 8px">Cadastro de Projetos</h2>
      <form class="form" id="form-projeto">
        <div class="row">
          <div class="col-6"><label>Nome do Projeto</label><input required id="proj-nome" type="text"
              placeholder="Ex.: API SELL" /></div>
          <div class="col-6"><label>Descrição (opcional)</label><input id="proj-desc" type="text"

              class="btn ghost" type="reset">Limpar</button><button class="btn ghost" type="button"
              id="btn-cancelar-edicao-proj" style="display:none;margin-left:8px">Cancelar Edição</button></div>
        </div>
      </form>
    </div>
    <div class="card">
      <h3 style="margin:0 0 8px">Projetos cadastrados</h3>
      <div id="lista-projetos" class="empty">Nenhum projeto cadastrado.</div>
    </div>
  </template>

  <template id="tpl-cad-status">
    <div class="card">
      <h2 style="margin:0 0 8px">Cadastro de Status</h2>
      <form class="form" id="form-status">
        <div class="row">
          <div class="col-4"><label>Nome do Status</label><input required id="status-nome" type="text"

          <div class="col-4"><label>Cor de Fundo</label><input id="status-cor-fundo" type="color" value="#6b7280" />

        </div>

      <h3 style="margin:0 0 8px">Status cadastrados</h3>
      <div id="lista-status" class="empty">Nenhum status cadastrado.</div>
    </div>

  <template id="tpl-cad-versoes">

      <h2 style="margin:0 0 8px">Cadastro de Versões</h2>
      <form class="form" id="form-versao">
        <div class="row">
          <div class="col-3"><label>Número da Versão</label><input required id="versao-numero" type="text"
              placeholder="Ex.: 1.8.2.118" /></div>
          <div class="col-3"><label>Projeto</label><input required id="versao-projeto" type="text"

          </div>
          <div class="col-3"><label>Pessoa</label><select required id="versao-pessoa"

              <option value="">Selecione a pessoa</option>
            </select></div>
          <div class="col-3"><label>Descrição (opcional)</label><input id="versao-desc" type="text"
              placeholder="Breve descrição da versão" /></div>
          <div class="col-12 actions"><button class="btn primary" type="submit">Adicionar</button><button
              class="btn ghost" type="reset">Limpar</button></div>

          <input type="text" id="filtro-versao-pessoa" placeholder="Filtrar por pessoa..."

              <th style="width:115px">Projetos</th>
              <th>DEV</th>
              <th>HML</th>
              <th>Versão</th>
              <th style="width:140px">Status</th>

  <template id="tpl-gerador-cpf">

        <h1>Gerador de CPF</h1>
        <p>Ferramenta para gerar CPFs válidos com opções de formatação.</p>
      </div>

      <!-- Controles do Gerador -->
      <div class="card" style="margin-bottom: 20px;">
        <div class="row">
          <div class="col-4">
            <label>Quantidade de CPFs</label>
            <select id="quantidade-cpf"
              style="width: 100%; padding: 10px 12px; border-radius: 10px; border: 2px solid var(--line); background: rgba(255,255,255,0.05); color: var(--text); font-size: 13px;">
              <option value="1" style="color: black;">1</option>

  <script>
    // ===== Util =====
    const $ = (sel, root = document) => {
      if (typeof sel !== 'string') {
        console.error('Seletor inválido:', sel);
        return null;
      }
      return root.querySelector(sel);
    };
    const $$ = (sel, root = document) => {
      if (typeof sel !== 'string') {
        console.error('Seletor inválido:', sel);
        return [];
      }
      return Array.from(root.querySelectorAll(sel));
    };

    const fmtDate = (d) => {
      const dt = (d instanceof Date) ? d : new Date(d);
      return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    };

    // ===== Estado =====
    const state = {
      pessoas: [],
      projetos: [],
      status: [],
      versoes: [],
      itens: [],
      filtros: { pessoa: '', projeto: '', status: [] },
      sort: { key: '', asc: true },
      editMode: null, // 'create', 'edit', ou null
      editIndex: null,
      nextId: 1, // ID único para cada item
      consultaRefreshCount: 0, // Contador para controlar refresh da consulta
    };

    // ===== Chrome Storage API =====
    async function loadFromStorage() {
      try {
        const result = await chrome.storage.local.get(['orion_pessoas', 'orion_projetos', 'orion_status', 'orion_versoes', 'orion_itens', 'orion_nextId', 'orion_consultaRefreshCount']);
        state.pessoas = result.orion_pessoas || [];
        state.projetos = result.orion_projetos || [];
        state.status = result.orion_status || [];
        state.versoes = result.orion_versoes || [];
        state.itens = result.orion_itens || [];
        state.nextId = result.orion_nextId || 1;
        state.consultaRefreshCount = result.orion_consultaRefreshCount || 0;
        console.log('Dados carregados do Chrome Storage:', {
          pessoas: state.pessoas.length,
          projetos: state.projetos.length,
          status: state.status.length,
          versoes: state.versoes.length,
          itens: state.itens.length,
          nextId: state.nextId,
          consultaRefreshCount: state.consultaRefreshCount
        });
      } catch (error) {
        console.log('Chrome Storage não disponível, usando localStorage');
        // Fallback para localStorage
        state.pessoas = JSON.parse(localStorage.getItem('orion_pessoas') || '[]');
        state.projetos = JSON.parse(localStorage.getItem('orion_projetos') || '[]');
        state.status = JSON.parse(localStorage.getItem('orion_status') || '[]');
        state.versoes = JSON.parse(localStorage.getItem('orion_versoes') || '[]');
        state.itens = JSON.parse(localStorage.getItem('orion_itens') || '[]');
        state.nextId = parseInt(localStorage.getItem('orion_nextId') || '1');
        state.consultaRefreshCount = parseInt(localStorage.getItem('orion_consultaRefreshCount') || '0');
        console.log('Dados carregados do localStorage:', {
          pessoas: state.pessoas.length,
          projetos: state.projetos.length,
          status: state.status.length,
          versoes: state.versoes.length,
          itens: state.itens.length,
          nextId: state.nextId,
          consultaRefreshCount: state.consultaRefreshCount
        });
      }
    }

    async function saveToStorage() {
      try {
        await chrome.storage.local.set({
          orion_pessoas: state.pessoas,
          orion_projetos: state.projetos,
          orion_status: state.status,
          orion_versoes: state.versoes,
          orion_itens: state.itens,
          orion_nextId: state.nextId,
          orion_consultaRefreshCount: state.consultaRefreshCount
        });
      } catch (error) {
        console.log('Chrome Storage não disponível, usando localStorage');
        // Fallback para localStorage
        localStorage.setItem('orion_pessoas', JSON.stringify(state.pessoas));
        localStorage.setItem('orion_projetos', JSON.stringify(state.projetos));
        localStorage.setItem('orion_status', JSON.stringify(state.status));
        localStorage.setItem('orion_versoes', JSON.stringify(state.versoes));
        localStorage.setItem('orion_itens', JSON.stringify(state.itens));
        localStorage.setItem('orion_nextId', state.nextId.toString());
        localStorage.setItem('orion_consultaRefreshCount', state.consultaRefreshCount.toString());
      }
    }



    // ===== Navegação / Views =====
    const views = {
      dashboard() {
        const template = document.getElementById('tpl-dashboard');

    };

    function go(view) {
      const container = document.getElementById('view-container');
      if (container) {
        container.innerHTML = '';
        container.appendChild(views[view]());
        document.body.dataset.view = view;
        location.hash = view;

    // ===== Cadastro de Versões =====
    function renderListaVersoes() {
      const wrap = document.getElementById('lista-versoes');
      if (!wrap) return;

      // Capturar filtros
      const filtroProjeto = document.getElementById('filtro-versao-projeto')?.value.toLowerCase() || '';
      const filtroNumero = document.getElementById('filtro-versao-numero')?.value.toLowerCase() || '';
      const filtroPessoa = document.getElementById('filtro-versao-pessoa')?.value.toLowerCase() || '';
      const filtroData = document.getElementById('filtro-versao-data')?.value || '';

      // Filtrar versões
      let versoesFiltradas = state.versoes.filter(v => {
        const projetoMatch = !filtroProjeto || (v.projeto || '').toLowerCase().includes(filtroProjeto);
        const numeroMatch = !filtroNumero || (v.numero || '').toLowerCase().includes(filtroNumero);
        const pessoaMatch = !filtroPessoa || (v.pessoa || '').toLowerCase().includes(filtroPessoa);

        let dataMatch = true;
        if (filtroData) {
          const dataFiltro = new Date(filtroData);
          const dataVersao = v.dataHora ? new Date(v.dataHora.split(' ')[0].split('/').reverse().join('-')) : null;
          dataMatch = dataVersao && dataFiltro.toDateString() === dataVersao.toDateString();
        }

        return projetoMatch && numeroMatch && pessoaMatch && dataMatch;
      });

      if (!versoesFiltradas.length) {
        wrap.className = 'empty';
        wrap.textContent = state.versoes.length ? 'Nenhuma versão encontrada com os filtros aplicados.' : 'Nenhuma versão cadastrada.';
        return;
      }

      wrap.className = '';
      wrap.innerHTML = `
            <div class="table-wrap">
                            <table><thead><tr><th>Projeto</th><th>Versão</th><th>Data/Hora</th><th>Pessoa</th><th>Descrição</th><th></th></tr></thead>
               <tbody>
                 ${versoesFiltradas.sort((a, b) => {
        // Ordenar por data mais recente primeiro
        const dateA = a.dataHora ? new Date(a.dataHora.split(' ')[0].split('/').reverse().join('-') + ' ' + a.dataHora.split(' ')[1]) : new Date(0);
        const dateB = b.dataHora ? new Date(b.dataHora.split(' ')[0].split('/').reverse().join('-') + ' ' + b.dataHora.split(' ')[1]) : new Date(0);
        return dateB - dateA;
      }).map((v, i) => `<tr><td>${v.projeto || ''}</td><td>${v.numero}</td><td>${v.dataHora || '--/--/---- --:--'}</td><td>${v.pessoa || ''}</td><td class="muted">${v.desc || ''}</td><td><button class="btn" data-del-versao="${i}">Excluir</button></td></tr>`).join('')}
               </tbody></table>
            </div>`;

      // Bind dos botões de excluir
      const deleteButtons = wrap.querySelectorAll('[data-del-versao]');

          const descEl = document.getElementById('versao-desc');

          const projeto = projetoEl ? projetoEl.value.trim() : '';

      return true;

      let rows = state.itens.filter(passesFilters);

      if (state.sort.key) {
        rows = rows.slice().sort((a, b) => {
          const ka = a[state.sort.key] || ''; const kb = b[state.sort.key] || '';
          const na = Number(ka.replace(/[^0-9]/g, ''));
          const nb = Number(kb.replace(/[^0-9]/g, ''));
          const isNum = !isNaN(na) && !isNaN(nb) && (String(ka).match(/^\d+$/) || String(kb).match(/^\d+$/));
          let r;
          if (isNum) { r = na - nb; }
          else { r = String(ka).localeCompare(String(kb), 'pt-BR', { numeric: true }); }
          return state.sort.asc ? r : -r;

      const parts = dateStr.split('/');
      if (parts.length === 3) {
        return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
      }
      return dateStr;
    }

    function formatDateForDisplay(dateStr) {
      if (!dateStr) return '';

      const parts = dateStr.split('-');
      if (parts.length === 3) {
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
      }
      return dateStr;
    }

    // ===== CSV =====
    function parseCSV(text) {
      // Aceita vírgula ou ponto-e-vírgula como separador. Suporta aspas simples.
      // Simples mas eficaz para o modelo informado.
      const lines = text.split(/\r?\n/).filter(l => l.trim().length);
      if (!lines.length) throw new Error('Sem linhas.');
      const sep = (text.includes(';') && !text.includes(',')) ? ';' : ',';
      const headers = splitCSVLine(lines[0], sep);
      const rows = lines.slice(1).map(l => splitCSVLine(l, sep));
      return rows.map(arr => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (arr[i] || '').trim());
        return obj;
      });
    }
    function splitCSVLine(line, sep) {
      const out = []; let cur = ''; let q = false; for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { q = !q; continue; }
        if (c === sep && !q) { out.push(cur); cur = ''; } else { cur += c; }
      } out.push(cur); return out;
    }

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

    // Parser para Registro Tipo 4 (Detalhe) - conforme Layout Arquivo Texto RPS V4.0
    function parseTipo4(line) {
      // Remove CRLF se existir
      const linha = line.replace(/\r?\n/g, '');

      // Mapeia os campos do Registro Tipo 4 usando substring (zero-based)
      // Layout é 1-based, então subtraímos 1 para obter o índice correto
      const registro = {
        tipoRegistro: linha.substring(0, 1).trim(),                          // pos 1
        enquadramentoSimples: linha.substring(1, 2).trim(),                  // pos 2
        regimeApuracaoSimples: linha.substring(2, 3).trim(),                 // pos 3
        codigoPaisPrestacao: linha.substring(3, 6).trim(),                   // pos 4-6
        codigoCidadePrestacao: linha.substring(6, 13).trim(),                // pos 7-13
        codigoCidadeTomador: linha.substring(13, 20).trim(),                 // pos 14-20
        nifTomadorEstrangeiro: linha.substring(20, 60).trim(),               // pos 21-60
        codigoNBS: linha.substring(60, 69).trim(),                           // pos 61-69
        cepTomadorExterior: linha.substring(69, 80).trim(),                  // pos 70-80
        estadoTomadorExterior: linha.substring(80, 140).trim(),              // pos 81-140
        vinculoPartes: linha.substring(140, 141).trim(),                     // pos 141
        reservado: linha.substring(141, 171).trim(),                         // pos 142-171
        cepServicoExterior: linha.substring(171, 182).trim(),                // pos 172-182
        estadoServicoExterior: linha.substring(182, 242).trim(),             // pos 183-242
        nomeEvento: linha.substring(242, 497).trim(),                        // pos 243-497
        dataInicioEvento: linha.substring(497, 505).trim(),                  // pos 498-505
        dataFimEvento: linha.substring(505, 513).trim(),                     // pos 506-513
        justificativaSubstituicao: linha.substring(513, 514).trim(),         // pos 514
        indicadorOperacao: linha.substring(514, 520).trim(),                 // pos 515-520
        classificacaoTributariaIBSCBS: linha.substring(520, 526).trim(),     // pos 521-526
        situacaoTributariaIBSCBS: linha.substring(526, 529).trim(),          // pos 527-529
        usoConsumoPessoal: linha.substring(529, 530).trim(),                 // pos 530
        indicadorDestinatario: linha.substring(530, 531).trim()              // pos 531
      };

      return registro;
    }

    function processarNF(fileInput) {
      console.log('ProcessarNF chamado com:', fileInput);

      if (!fileInput) {
        console.error('Elemento nfFile não encontrado');
        alert('Erro: Elemento de arquivo não encontrado');
        return;
      }

      const file = fileInput.files[0];
      if (!file) {
        alert('Selecione um arquivo .txt primeiro!');
        return;
      }

      const reader = new FileReader();
      reader.onload = function (e) {
        const linhas = e.target.result.split('\n').filter(linha => linha.trim());
        const output = document.getElementById('output');
        if (!output) {
          console.error('Elemento output não encontrado');
          alert('Erro: Elemento de saída não encontrado');
          return;
        }
        output.innerHTML = ''; // Limpa o conteúdo anterior
        output.style.display = 'block';

        let totalServico = 0;
        let totalRetencao = 0;
        let contadorNF = 0; // Inicializa o contador de NFs em 0

        // Mostrar painel de informações
        const infoPanel = document.getElementById('infoPanel');
        if (infoPanel) infoPanel.style.display = 'block';

        // Atualiza o total de linhas
        atualizarInfoPanel('-', totalServico, totalRetencao, contadorNF, 'Iniciando processamento');

        console.log('Iniciando processamento de', linhas.length, 'linhas');

        // Processa cada linha
        linhas.forEach((linha, idx) => {
          if (!linha) return;

          let tipoRegistro = '';
          let status = 'Processando';

    // ===== Gerador de CPF =====
    function gerarCPF() {
      // Gera 9 dígitos aleatórios
      const digitos = [];
      for (let i = 0; i < 9; i++) {
        digitos.push(Math.floor(Math.random() * 10));
      }

      // Calcula o primeiro dígito verificador
      let soma = 0;
      for (let i = 0; i < 9; i++) {
        soma += digitos[i] * (10 - i);
      }
      let resto = soma % 11;
      const primeiroDigito = resto < 2 ? 0 : 11 - resto;
      digitos.push(primeiroDigito);

      // Calcula o segundo dígito verificador
      soma = 0;
      for (let i = 0; i < 10; i++) {
        soma += digitos[i] * (11 - i);
      }
      resto = soma % 11;
      const segundoDigito = resto < 2 ? 0 : 11 - resto;
      digitos.push(segundoDigito);

      return digitos.join('');
    }

    function formatarCPF(cpf, comMascara) {
      if (comMascara) {
        return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
      }
      return cpf;
    }

      // Função para copiar CPF individual
      window.copiarCPF = async function (cpf) {
        try {
          await navigator.clipboard.writeText(cpf);

          // Feedback visual - encontrar o botão que foi clicado
          const buttons = document.querySelectorAll('button[onclick*="copiarCPF"]');
          buttons.forEach(btn => {
            if (btn.onclick.toString().includes(cpf)) {
              const originalText = btn.textContent;
              btn.textContent = 'Copiado!';
              btn.style.background = 'var(--gradient-secondary)';
              btn.style.color = 'white';

              setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
                btn.style.color = '';
              }, 2000);
            }
          });

          console.log('CPF copiado para a área de transferência:', cpf);
        } catch (err) {
          // Fallback para navegadores mais antigos
          const textArea = document.createElement('textarea');
          textArea.value = cpf;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);

          // Feedback visual
          const buttons = document.querySelectorAll('button[onclick*="copiarCPF"]');
          buttons.forEach(btn => {
            if (btn.onclick.toString().includes(cpf)) {
              const originalText = btn.textContent;
              btn.textContent = 'Copiado!';
              btn.style.background = 'var(--gradient-secondary)';
              btn.style.color = 'white';

              setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
                btn.style.color = '';
              }, 2000);
            }
          });

          console.log('CPF copiado para a área de transferência (fallback):', cpf);
        }
      };

      // Gerar um CPF inicial automaticamente
      setTimeout(() => {
        btnGerar.click();
      }, 100);
    }

    // ===== Gerador de CNPJ =====
    function gerarCNPJ() {
      // Gerar os primeiros 12 dígitos aleatoriamente
      let cnpj = '';
      for (let i = 0; i < 12; i++) {
        cnpj += Math.floor(Math.random() * 10);
      }

      // Calcular o primeiro dígito verificador
      let soma = 0;
      let peso = 5;
      for (let i = 0; i < 12; i++) {
        soma += parseInt(cnpj[i]) * peso;
        peso = peso === 2 ? 9 : peso - 1;
      }
      let resto = soma % 11;
      let digito1 = resto < 2 ? 0 : 11 - resto;
      cnpj += digito1;

      // Calcular o segundo dígito verificador
      soma = 0;
      peso = 6;
      for (let i = 0; i < 13; i++) {
        soma += parseInt(cnpj[i]) * peso;
        peso = peso === 2 ? 9 : peso - 1;
      }
      resto = soma % 11;
      let digito2 = resto < 2 ? 0 : 11 - resto;
      cnpj += digito2;

      return cnpj;
    }

    function formatarCNPJ(cnpj, comMascara) {
      if (comMascara) {
        return cnpj.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
      }
      return cnpj;
    }

    // ===== Consulta de Endereço EUA =====
    async function consultarEnderecoEUA(zipCode) {
      try {
        // Limpar ZIP Code (remover caracteres não numéricos)
        const zipLimpo = zipCode.replace(/\D/g, '');
        
        if (!zipLimpo || zipLimpo.length < 5) {
          throw new Error('ZIP Code inválido. Digite um código postal válido dos EUA.');
        }

        // Consultar dados do ZIP Code
        const zipResponse = await fetch(`https://api.zippopotam.us/us/${zipLimpo}`);
        
        if (!zipResponse.ok) {
          throw new Error('ZIP Code não encontrado. Verifique o código e tente novamente.');
        }
        
        const zipData = await zipResponse.json();
        const place = zipData.places[0];
        const { latitude, longitude } = place;

        // Consultar dados detalhados de geolocalização
        const geoResponse = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`,
          {
            headers: { 'User-Agent': 'OrionSystem/1.0' }
          }
        );

        if (!geoResponse.ok) {
          throw new Error('Erro ao consultar dados de geolocalização.');
        }

        const geoData = await geoResponse.json();

        return {
          success: true,
          zipCode: zipData['post code'],
          country: zipData.country,
          countryAbbr: zipData['country abbreviation'],
          placeName: place['place name'],
          state: place.state,
          stateAbbr: place['state abbreviation'],
          latitude: latitude,
          longitude: longitude,
          neighbourhood: geoData.address.neighbourhood || 'N/A',
          road: geoData.address.road || 'N/A',
          suburb: geoData.address.suburb || 'N/A',
          city: geoData.address.city || geoData.address.town || place['place name'],
          county: geoData.address.county || 'N/A',
          displayName: geoData.display_name
        };
      } catch (error) {
        return {
          success: false,
          error: error.message
        };
      }
    }

    // ===== Gerador de RG =====
    function gerarRG() {
      // Gerar os primeiros 8 dígitos aleatoriamente
      let rg = '';
      for (let i = 0; i < 8; i++) {
        rg += Math.floor(Math.random() * 10);
      }

      // Calcular o dígito verificador
      let soma = 0;
      let peso = 2;
      for (let i = 0; i < 8; i++) {
        soma += parseInt(rg[i]) * peso;
        peso++;
      }
      let resto = soma % 11;
      let digito = resto === 0 ? 0 : 11 - resto;

      // Se o dígito for 10, usar 'X'
      if (digito === 10) {
        digito = 'X';
      }

      rg += digito;
      return rg;
    }

    function formatarRG(rg, comMascara) {
      if (comMascara) {
        return rg.replace(/(\d{2})(\d{3})(\d{3})(\w{1})/, '$1.$2.$3-$4');
      }
      return rg;
    }

    // ===== Gerador de Cartão de Crédito =====
    function gerarNumeroCartao(bandeira = 'visa') {
      // Gera um número de cartão válido usando algoritmo de Luhn
      let numero = '';
      let comprimento = 16;

      // Define o prefixo e comprimento baseado na bandeira
      switch (bandeira) {
        case 'visa':
          numero = '4';
          break;
        case 'mastercard':
          numero = '5' + (Math.floor(Math.random() * 5) + 1);
          break;
        case 'amex':
          numero = '3' + (Math.floor(Math.random() * 2) + 4);
          comprimento = 15;
          break;
        case 'elo':
          numero = '6' + (Math.floor(Math.random() * 3) + 3);
          break;
        case 'hipercard':
          numero = '6' + (Math.floor(Math.random() * 2) + 0);
          break;
        case 'discover':
          numero = '6' + (Math.floor(Math.random() * 2) + 0);
          break;
        default:
          numero = '4';
      }

      // Gera os dígitos restantes (exceto o último que será o verificador)
      const digitosRestantes = comprimento - numero.length - 1;
      for (let i = 0; i < digitosRestantes; i++) {
        numero += Math.floor(Math.random() * 10);
      }

      // Calcula o dígito verificador usando algoritmo de Luhn
      let soma = 0;
      let duplicar = false;

      for (let i = numero.length - 1; i >= 0; i--) {
        let digito = parseInt(numero[i]);

        if (duplicar) {
          digito *= 2;
          if (digito > 9) {
            digito = digito.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
          }
        }

        soma += digito;
        duplicar = !duplicar;
      }

      let digitoVerificador = (10 - (soma % 10)) % 10;
      return numero + digitoVerificador;
    }

    function gerarDataValidade() {
      const hoje = new Date();
      const anoAtual = hoje.getFullYear();
      const mesAtual = hoje.getMonth() + 1;

      // Gera um ano entre o atual + 1 e atual + 10
      const ano = anoAtual + Math.floor(Math.random() * 10) + 1;
      // Gera um mês entre 1 e 12
      const mes = Math.floor(Math.random() * 12) + 1;

      return `${mes.toString().padStart(2, '0')}/${ano.toString().slice(-2)}`;
    }

    function gerarCVV(bandeira = 'visa') {
      // Gera um CVV de 3 dígitos (4 para American Express)
      if (bandeira === 'amex') {
        return Math.floor(Math.random() * 9000) + 1000;
      }
      return Math.floor(Math.random() * 900) + 100;
    }

    function formatarNumeroCartao(numero, comMascara, bandeira = 'visa') {
      if (comMascara) {
        if (bandeira === 'amex') {
          return numero.replace(/(\d{4})(\d{6})(\d{5})/, '$1 $2 $3');
        } else {
          return numero.replace(/(\d{4})(\d{4})(\d{4})(\d{4})/, '$1 $2 $3 $4');
        }
      }
      return numero;
    }
