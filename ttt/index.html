      function extractNumbersPreserveOrder(text) {
        const matches = text.match(/\d+/g) || [];
        const seen = new Set();
        const list = [];
        for (const m of matches) {
          const n = Number(m);
          if (!seen.has(n)) {
            seen.add(n);
            list.push(n);
          }
        }
        return list;
      }

      function formatWithBrackets(nums) {
        if (!nums || nums.length === 0) return '[]';
        // cada objeto em sua própria linha; vírgula apenas entre itens (não após último)
        const lines = nums.map((n, i) => `  {"FileExternalId":${n}}${i < nums.length - 1 ? ',' : ''}`);
        return '[\n' + lines.join('\n') + '\n]';
      }

      document.getElementById('convert').addEventListener('click', () => {
        const raw = input.value;
        const extracted = extractNumbersPreserveOrder(raw);
        output.textContent = formatWithBrackets(extracted);
        info.textContent = `Números extraídos: ${extracted.length}. (repetidos removidos, ordem preservada)`;
        stats.textContent = '';
      });

      document.getElementById('clear').addEventListener('click', () => {
        input.value = '';
        output.textContent = '';
        info.textContent = '';
        stats.textContent = '';
      });

      document.getElementById('sample').addEventListener('click', async () => {
        try {
          const clipboardText = await navigator.clipboard.readText();
          input.value = clipboardText;
        } catch (e) {
          // Fallback para navegadores mais antigos ou quando a API não está disponível
          try {
            const textArea = document.createElement('textarea');
            document.body.appendChild(textArea);
            textArea.focus();
            document.execCommand('paste');
            const clipboardText = textArea.value;
            document.body.removeChild(textArea);
            input.value = clipboardText;
          } catch (fallbackError) {
            alert('Não foi possível acessar a área de transferência. Cole os dados manualmente no campo.');
          }
        }
      });

      document.getElementById('copy').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(output.textContent);
          stats.textContent = 'Copiado para a área de transferência!';
        } catch (e) {
          stats.textContent = 'Falha ao copiar.';
        }
      });

      document.getElementById('download').addEventListener('click', () => {
        const now = new Date();
        const pad = (n) => n.toString().padStart(2, '0');

        const dd = pad(now.getDate());
        const mm = pad(now.getMonth() + 1); // mês começa do 0
        const yyyy = now.getFullYear();
        const hh = pad(now.getHours());
        const min = pad(now.getMinutes());
        const ss = pad(now.getSeconds());

        const fileName = `fileExternalIds${dd}${mm}${yyyy}${hh}${min}${ss}.json`;

        const blob = new Blob([output.textContent], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });

      input.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('convert').click();
        }
      });
    }

    // ===== Motor de Busca / Geração de Collection =====
    function initGeracaoCollection() {
      // Inicializar com o primeiro cenário automaticamente
      adicionarCenario();
    }

    let cenarios = [];
    let proximoIdCenario = 1;
    const LIMITE_PESSOAS = 10;

    function atualizarInfoLimite(cenarioId) {
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return;

      const total = calcularTotalPessoas(cenarioId);
      const quartosElements = document.querySelectorAll(`#cenario-${cenarioId} .quarto`);

      quartosElements.forEach((quarto, index) => {
        if (total >= LIMITE_PESSOAS) {
          quarto.classList.add('limite-alcançado');
        } else {
          quarto.classList.remove('limite-alcançado');
        }
      });
    }

    function calcularTotalPessoas(cenarioId) {
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return 0;
      return cenario.quartos.reduce((total, quarto) => total + quarto.adt + quarto.chd, 0);
    }

    function getPessoasDisponiveis(cenarioId) {
      return LIMITE_PESSOAS - calcularTotalPessoas(cenarioId);
    }

    function getPessoasDisponiveisParaQuarto(cenarioId, indexQuarto) {
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return 0;
      // Calcula pessoas disponíveis excluindo o quarto atual
      const pessoasNoQuartoAtual = cenario.quartos[indexQuarto] ? cenario.quartos[indexQuarto].adt + cenario.quartos[indexQuarto].chd : 0;
      const totalUsado = calcularTotalPessoas(cenarioId) - pessoasNoQuartoAtual;
      return LIMITE_PESSOAS - totalUsado;
    }

    function atualizarOpcoesAdultos(cenarioId, index) {
      const select = document.getElementById(`adultos-${cenarioId}-${index}`);
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario || !select) return;

      const pessoasDisponiveis = getPessoasDisponiveisParaQuarto(cenarioId, index);
      const valorAtual = cenario.quartos[index].adt;

      // Salvar valor atual
      const valorSelecionado = parseInt(select.value);

      // Recriar opções
      select.innerHTML = "";
      const maxAdultos = Math.min(LIMITE_PESSOAS, pessoasDisponiveis);

      for (let i = 1; i <= maxAdultos; i++) {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = i;
        if (i === valorSelecionado && i <= maxAdultos) {
          opt.selected = true;
        }
        select.appendChild(opt);
      }

      // Se o valor atual excede o novo limite, ajustar
      if (valorSelecionado > maxAdultos) {
        cenario.quartos[index].adt = maxAdultos;
        select.value = maxAdultos;
        // Ajustar também as crianças se necessário
        if (cenario.quartos[index].chd > 0) {
          const maxCriancas = Math.min(pessoasDisponiveis - maxAdultos, cenario.quartos[index].chd);
          cenario.quartos[index].chd = maxCriancas;
          atualizarOpcoesCriancas(cenarioId, index);
        }
      }
    }

    function atualizarOpcoesCriancas(cenarioId, index) {
      const select = document.getElementById(`criancas-${cenarioId}-${index}`);
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario || !select) return;

      const pessoasDisponiveis = getPessoasDisponiveisParaQuarto(cenarioId, index);
      const adultosAtuais = cenario.quartos[index].adt;
      const valorAtual = cenario.quartos[index].chd;

      // Salvar valor atual
      const valorSelecionado = parseInt(select.value);

      // Recriar opções
      select.innerHTML = "";
      const maxCriancas = Math.min(LIMITE_PESSOAS - adultosAtuais, pessoasDisponiveis - adultosAtuais);

      for (let i = 0; i <= maxCriancas; i++) {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = i;
        if (i === valorSelecionado && i <= maxCriancas) {
          opt.selected = true;
        }
        select.appendChild(opt);
      }

      // Se o valor atual excede o novo limite, ajustar
      if (valorSelecionado > maxCriancas) {
        cenario.quartos[index].chd = maxCriancas;
        select.value = maxCriancas;
        // Atualizar interface das idades
        atualizarCriancas(cenarioId, index, select);
      }
    }

    function atualizarOpcoesTodosQuartos(cenarioId) {
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return;

      cenario.quartos.forEach((_, index) => {
        atualizarOpcoesAdultos(cenarioId, index);
        atualizarOpcoesCriancas(cenarioId, index);
      });
    }

    function criarQuarto(cenarioId, index) {
      const quarto = document.createElement('div');
      quarto.className = 'quarto';
      quarto.dataset.index = index;

      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return quarto;

      // Calcular opções disponíveis para este quarto
      const pessoasDisponiveis = getPessoasDisponiveisParaQuarto(cenarioId, index);
      const opcoesAdultos = Math.min(LIMITE_PESSOAS, pessoasDisponiveis);

      // Verificar se é o último quarto
      const isUltimoQuarto = index === cenario.quartos.length - 1;

      quarto.innerHTML = `
           <h3>Quarto ${index + 1}</h3>
           <div class="linha-adultos-criancas" id="f-pessoa">
             <label>
               <span>Adultos</span>
               <select onchange="atualizarAdultos(${cenarioId}, ${index}, this)" id="adultos-${cenarioId}-${index}">
                 ${Array.from({ length: opcoesAdultos }, (_, i) => `<option value="${i + 1}" ${i === 0 ? 'selected' : ''}>${i + 1}</option>`).join("")}
               </select>
             </label>
             <label>
               <span>Crianças</span>
               <select onchange="atualizarCriancas(${cenarioId}, ${index}, this)" id="criancas-${cenarioId}-${index}">
                 <option value="0" selected>0</option>
               </select>
             </label>
           </div>
           <div class="idades" id="idades-${cenarioId}-${index}"></div>
            ${isUltimoQuarto ? `<button onclick="adicionarQuarto(${cenarioId})" class="btn-adicionar">+ Adicionar Quarto</button>` : ""}
         `;
      return quarto;
    }

    window.atualizarAdultos = function(cenarioId, index, select) {
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return;

      const valorAnterior = cenario.quartos[index].adt;
      const valor = parseInt(select.value);
      const diferenca = valor - valorAnterior;
      const pessoasDisponiveis = getPessoasDisponiveis(cenarioId);

      // Verificar se excede o limite global
      if (diferenca > pessoasDisponiveis) {
        alert(`Não é possível adicionar tantos adultos. Apenas ${pessoasDisponiveis} pessoas estão disponíveis no limite global.`);
        select.value = valorAnterior;
        return;
      }

      cenario.quartos[index].adt = valor;

      // Atualizar opções de crianças para este quarto
      atualizarOpcoesCriancas(cenarioId, index);

      // Atualizar opções de adultos e crianças em todos os outros quartos
      atualizarOpcoesTodosQuartos(cenarioId);

      // Força atualização das idades
      atualizarCriancas(cenarioId, index, document.getElementById(`criancas-${cenarioId}-${index}`));
      atualizarInfoLimite(cenarioId);

      // Salvar dados automaticamente
      salvarDadosTodosCenarios();
    };

    window.atualizarCriancas = function(cenarioId, index, select) {
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return;

      const valorAnterior = cenario.quartos[index].chd;
      const valor = parseInt(select.value);
      const diferenca = valor - valorAnterior;
      const pessoasDisponiveis = getPessoasDisponiveis(cenarioId);

      // Verificar se excede o limite global
      if (diferenca > pessoasDisponiveis) {
        alert(`Não é possível adicionar tantas crianças. Apenas ${pessoasDisponiveis} pessoas estão disponíveis no limite global.`);
        select.value = valorAnterior;
        return;
      }

      cenario.quartos[index].chd = valor;

      // Atualizar opções de adultos e crianças em todos os outros quartos
      atualizarOpcoesTodosQuartos(cenarioId);

      const idadesDiv = document.getElementById(`idades-${cenarioId}-${index}`);
      idadesDiv.innerHTML = "";

      const novasIdades = [];
      for (let i = 0; i < valor; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = "child-age-container";

        // Criar elemento para mensagem de erro
        const errorMessage = document.createElement("div");
        errorMessage.className = "error-message";
        errorMessage.style.display = "none";

        const label = document.createElement("label");
        label.textContent = `Criança ${i + 1}`;

        const inputIdade = document.createElement('input');
        inputIdade.type = "number";
        inputIdade.min = 0;
        inputIdade.max = 17;
        inputIdade.required = true;
        inputIdade.className = "child-age";
        inputIdade.id = `idade-${cenarioId}-${index}-${i}`;
        inputIdade.placeholder = "0-17";
        inputIdade.value = cenario.quartos[index].chdAges[i] || "";

        // Adicionar evento onchange
        inputIdade.onchange = () => {
          const valor = parseInt(inputIdade.value);

          // Se o campo estiver vazio, manter vermelho se já estava inválido
          if (inputIdade.value === "" || isNaN(valor)) {
            if (inputIdade.classList.contains('invalid')) {
              // Manter vermelho se já estava inválido
              novasIdades[i] = 0;
            } else {
              // Voltar ao normal se não estava inválido
              inputIdade.classList.remove('invalid');
              errorMessage.style.display = "none";
              errorMessage.style.visibility = "hidden";
              novasIdades[i] = 0;
            }
            cenario.quartos[index].chdAges = [...novasIdades];
            return;
          }

          // Validar idade apenas se houver valor
          if (valor < 0) {
            inputIdade.value = 0;
            inputIdade.classList.remove('invalid');
            errorMessage.style.display = "none";
            novasIdades[i] = 0;
          } else if (valor > 17) {
            inputIdade.value = "";
            inputIdade.classList.add('invalid');
            errorMessage.textContent = "Máximo 17 anos";
            errorMessage.style.display = "block";
            errorMessage.style.opacity = "1";
            errorMessage.style.visibility = "visible";
            novasIdades[i] = 0;
          } else {
            inputIdade.classList.remove('invalid');
            errorMessage.style.display = "none";
            errorMessage.style.visibility = "hidden";
            novasIdades[i] = valor;
          }

          cenario.quartos[index].chdAges = [...novasIdades];

          // Salvar dados automaticamente
          salvarDadosTodosCenarios();
        };

        // Validação adicional quando o usuário sai do campo
        inputIdade.onblur = () => {
          const valor = parseInt(inputIdade.value);

          // Se o campo estiver vazio, manter vermelho se já estava inválido
          if (inputIdade.value === "" || isNaN(valor)) {
            if (inputIdade.classList.contains('invalid')) {
              // Manter vermelho se já estava inválido
              novasIdades[i] = 0;
            } else {
              // Voltar ao normal se não estava inválido
              inputIdade.classList.remove('invalid');
              errorMessage.style.display = "none";
              errorMessage.style.visibility = "hidden";
              novasIdades[i] = 0;
            }
            cenario.quartos[index].chdAges = [...novasIdades];
            return;
          }

          // Validar idade apenas se houver valor
          if (valor < 0) {
            inputIdade.value = 0;
            inputIdade.classList.remove('invalid');
            errorMessage.style.display = "none";
            novasIdades[i] = 0;
          } else if (valor > 17) {
            inputIdade.value = "";
            inputIdade.classList.add('invalid');
            errorMessage.textContent = "Máximo 17 anos";
            errorMessage.style.display = "block";
            errorMessage.style.opacity = "1";
            errorMessage.style.visibility = "visible";
            novasIdades[i] = 0;
          } else {
            inputIdade.classList.remove('invalid');
            errorMessage.style.display = "none";
            errorMessage.style.visibility = "hidden";
            novasIdades[i] = valor;
          }

          cenario.quartos[index].chdAges = [...novasIdades];

          // Salvar dados automaticamente
          salvarDadosTodosCenarios();
        };

        // Adicionar evento onfocus para limpar erro quando clicar no campo
        inputIdade.onfocus = () => {
          if (inputIdade.classList.contains('invalid')) {
            inputIdade.classList.remove('invalid');
            errorMessage.style.display = "none";
            errorMessage.style.visibility = "hidden";
            inputIdade.value = "";
          }
        };

        wrapper.appendChild(errorMessage);
        wrapper.appendChild(label);
        wrapper.appendChild(inputIdade);
        idadesDiv.appendChild(wrapper);

        novasIdades[i] = cenario.quartos[index].chdAges[i] || "";
      }

      cenario.quartos[index].chdAges = novasIdades;
      atualizarInfoLimite(cenarioId);

      // Salvar dados automaticamente
      salvarDadosTodosCenarios();
    };

    window.adicionarQuarto = function(cenarioId) {
      // Verificar se ainda é possível adicionar outro quarto
      if (getPessoasDisponiveis(cenarioId) <= 0) {
        alert("Limite global de 10 pessoas atingido. Não é possível adicionar mais quartos.");
        return;
      }

      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return;

      // Remover botão "Adicionar Quarto" do quarto anterior (se existir)
      const botaoAnterior = document.querySelector(`#cenario-${cenarioId} .btn-adicionar`);
      if (botaoAnterior) {
        botaoAnterior.remove();
      }

      const index = cenario.quartos.length;
      cenario.quartos.push({ adt: 1, chd: 0, chdAges: [] });
      document.getElementById(`quartos-${cenarioId}`).appendChild(criarQuarto(cenarioId, index));

      // Atualizar opções em todos os quartos após adicionar novo quarto
      atualizarOpcoesTodosQuartos(cenarioId);

      atualizarInfoLimite(cenarioId);

      // Salvar dados automaticamente
      salvarDadosTodosCenarios();
    };

    function renderizarQuartos(cenarioId) {
      const container = document.getElementById(`quartos-${cenarioId}`);
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!container || !cenario) return;

      container.innerHTML = "";

      // Criar uma cópia dos dados dos quartos para preservar
      const dadosQuartos = cenario.quartos.map(quarto => ({
        adt: quarto.adt,
        chd: quarto.chd,
        chdAges: [...(quarto.chdAges || [])]
      }));

      cenario.quartos.forEach((quarto, i) => {
        container.appendChild(criarQuarto(cenarioId, i));

        // Restaurar valores anteriores
        const adultosSelect = document.getElementById(`adultos-${cenarioId}-${i}`);
        const criancasSelect = document.getElementById(`criancas-${cenarioId}-${i}`);

        if (adultosSelect && criancasSelect) {
          adultosSelect.value = dadosQuartos[i].adt;
          criancasSelect.value = dadosQuartos[i].chd;

          // Restaurar as idades das crianças
          if (dadosQuartos[i].chd > 0) {
            atualizarCriancas(cenarioId, i, criancasSelect);
          }
        }
      });

      // Atualizar opções após renderizar
      atualizarOpcoesTodosQuartos(cenarioId);
    }

    function processarCenario(cenarioId) {
      const cenario = cenarios.find(c => c.id === cenarioId);
      if (!cenario) return;

      // Validar idades das crianças antes de processar
      let idadesInvalidas = false;

      cenario.quartos.forEach((quarto, quartoIndex) => {
        if (quarto.chdAges && quarto.chdAges.length > 0) {
          quarto.chdAges.forEach((idade, idadeIndex) => {
            if (idade < 0 || idade > 17 || isNaN(idade)) {
              idadesInvalidas = true;
              alert(`Quarto ${quartoIndex + 1}, Criança ${idadeIndex + 1}: Idade inválida (${idade}). Deve estar entre 0 e 17 anos.`);
            }
          });
        }
      });

      if (idadesInvalidas) {
        return;
      }

      // Criar array com todos os cenários atualizados
      const todosCenarios = cenarios.map(c => ({
        id: c.id,
        nome: document.getElementById(`nome-${c.id}`) ? document.getElementById(`nome-${c.id}`).value : c.nome,
        idOrigem: document.getElementById(`origem-${c.id}`) ? document.getElementById(`origem-${c.id}`).value : c.origem,
        idDestino: document.getElementById(`destino-${c.id}`) ? document.getElementById(`destino-${c.id}`).value : c.destino,
        quartos: c.quartos
      }));

      // Salvar no JSON
      document.getElementById("saida").textContent = JSON.stringify(todosCenarios, null, 2);
    }

    window.salvarUltimoCenario = function() {
      if (cenarios.length === 0) {
        alert("Não há cenários para salvar!");
        return;
      }

      // Salvar dados de TODOS os cenários antes de processar
      cenarios.forEach(cenario => {
        const nomeInput = document.getElementById(`nome-${cenario.id}`);
        const origemInput = document.getElementById(`origem-${cenario.id}`);
        const destinoInput = document.getElementById(`destino-${cenario.id}`);

        if (nomeInput) cenario.nome = nomeInput.value;
        if (origemInput) cenario.origem = origemInput.value;
        if (destinoInput) cenario.destino = destinoInput.value;
      });

      // Processar o último cenário (que vai atualizar o JSON completo)
      const ultimoCenario = cenarios[cenarios.length - 1];
      processarCenario(ultimoCenario.id);
    };

    function criarCenario(id, index) {
      const cenario = document.createElement('div');
      cenario.className = 'cenario';
      cenario.id = `cenario-${id}`;

      cenario.innerHTML = `
            <div class="cenario-header">
              <h3 class="cenario-titulo">Cenário ${index + 1}</h3>
            </div>
           
           <div class="linha-topo">
             <label>
               <span>Nome do cenário</span>
               <input type="text" id="nome-${id}" placeholder="Digite o nome do cenário" oninput="salvarDadosCenario(${id}, 'nome', this.value)">
             </label>
             <label>
               <span>Origem</span>
               <input type="text" id="origem-${id}" placeholder="Digite a origem" oninput="salvarDadosCenario(${id}, 'origem', this.value)">
             </label>
             <label>
               <span>Destino</span>
               <input type="text" id="destino-${id}" placeholder="Digite o destino" oninput="salvarDadosCenario(${id}, 'destino', this.value)">
             </label>
           </div>
           
                       <div id="quartos-${id}"></div>
          `;

      return cenario;
    }

    window.adicionarCenario = function() {
      // Se já existe um cenário, validar campos obrigatórios antes de criar novo
      if (cenarios.length > 0) {
        const ultimoCenario = cenarios[cenarios.length - 1];

        // Salvar dados do cenário atual antes de validar
        const nomeInput = document.getElementById(`nome-${ultimoCenario.id}`);
        const origemInput = document.getElementById(`origem-${ultimoCenario.id}`);
        const destinoInput = document.getElementById(`destino-${ultimoCenario.id}`);

        if (nomeInput) ultimoCenario.nome = nomeInput.value.trim();
        if (origemInput) ultimoCenario.origem = origemInput.value.trim();
        if (destinoInput) ultimoCenario.destino = destinoInput.value.trim();

        // Validar campos obrigatórios
        if (!ultimoCenario.nome || !ultimoCenario.origem || !ultimoCenario.destino) {
          // Destacar campos vazios
          if (!ultimoCenario.nome && nomeInput) {
            nomeInput.style.borderColor = '#ef4444';
            nomeInput.focus();
          }
          if (!ultimoCenario.origem && origemInput) {
            origemInput.style.borderColor = '#ef4444';
            if (!ultimoCenario.nome) origemInput.focus();
          }
          if (!ultimoCenario.destino && destinoInput) {
            destinoInput.style.borderColor = '#ef4444';
            if (!ultimoCenario.nome && !ultimoCenario.origem) destinoInput.focus();
          }
          
          return; // Impedir criação do novo cenário
        }

        // Remover destaque vermelho se campos estão preenchidos
        if (nomeInput) nomeInput.style.borderColor = '#475569';
        if (origemInput) origemInput.style.borderColor = '#475569';
        if (destinoInput) destinoInput.style.borderColor = '#475569';

        processarCenario(ultimoCenario.id);
      }

      const id = proximoIdCenario++;
      const index = cenarios.length;
      cenarios.push({
        id: id,
        nome: "",
        origem: "",
        destino: "",
        quartos: []
      });

      document.getElementById("cenarios").appendChild(criarCenario(id, index));

      // Adicionar primeiro quarto ao cenário
      adicionarQuarto(id);

      // Salvar dados automaticamente
      salvarDadosTodosCenarios();
    };

    function renderizarCenarios() {
      const container = document.getElementById("cenarios");
      container.innerHTML = "";

      cenarios.forEach((cenario, i) => {
        container.appendChild(criarCenario(cenario.id, i));

        // Restaurar dados do cenário
        const nomeInput = document.getElementById(`nome-${cenario.id}`);
        const origemInput = document.getElementById(`origem-${cenario.id}`);
        const destinoInput = document.getElementById(`destino-${cenario.id}`);

        if (nomeInput) nomeInput.value = cenario.nome || "";
        if (origemInput) origemInput.value = cenario.origem || "";
        if (destinoInput) destinoInput.value = cenario.destino || "";

        // Restaurar quartos
        cenario.quartos.forEach((quarto, j) => {
          document.getElementById(`quartos-${cenario.id}`).appendChild(criarQuarto(cenario.id, j));
        });

        // Restaurar valores dos selects e idades
        cenario.quartos.forEach((quarto, j) => {
          const adultosSelect = document.getElementById(`adultos-${cenario.id}-${j}`);
          const criancasSelect = document.getElementById(`criancas-${cenario.id}-${j}`);

          if (adultosSelect && criancasSelect) {
            adultosSelect.value = quarto.adt;
            criancasSelect.value = quarto.chd;

            // Restaurar as idades das crianças
            if (quarto.chd > 0) {
              atualizarCriancas(cenario.id, j, criancasSelect);

              // Restaurar valores das idades
              setTimeout(() => {
                quarto.chdAges.forEach((idade, k) => {
                  const inputIdade = document.getElementById(`idade-${cenario.id}-${j}-${k}`);
                  if (inputIdade) {
                    inputIdade.value = idade;
                  }
                });
              }, 100);
            }
          }
        });

        // Atualizar opções após renderizar
        atualizarOpcoesTodosQuartos(cenario.id);
      });
    }

        "Onze", "Doze", "Treze", "Quatorze", "Quinze", "Dezesseis", "Dezessete", "Dezoito", "Dezenove", "Vinte"

      // Validar dados dos cenários

    // ===== OFX para Base64 =====
    function initOfxBase64() {
      const fileInput = document.getElementById('ofxFile');
      const fileLabel = document.getElementById('ofxFileLabelText');
      const btnLimpar = document.getElementById('btn-limpar-ofx');
      const resultado = document.getElementById('ofx-resultado');
      const output = document.getElementById('ofx-base64-output');
      const btnCopiar = document.getElementById('btn-copiar-base64');
      const charsCount = document.getElementById('ofx-chars-count');

      if (!fileInput) return;

      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (!file) return;
        fileLabel.textContent = '📄 ' + file.name;
        btnLimpar.style.display = '';
        resultado.style.display = 'none';
        output.value = '';
        const reader = new FileReader();
        reader.onload = (e) => {
          const bytes = new Uint8Array(e.target.result);
          let binary = '';
          for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
          }
          const base64 = btoa(binary);
          output.value = base64;
          charsCount.textContent = base64.length.toLocaleString('pt-BR') + ' caracteres';
          resultado.style.display = '';
        };
        reader.readAsArrayBuffer(file);
      });

      btnLimpar.addEventListener('click', () => {
        fileInput.value = '';
        fileLabel.textContent = '📁 Selecionar Arquivo OFX';
        btnLimpar.style.display = 'none';
        resultado.style.display = 'none';
        output.value = '';
        charsCount.textContent = '';
      });

      btnCopiar.addEventListener('click', () => {
        if (!output.value) return;
        navigator.clipboard.writeText(output.value).then(() => {
          btnCopiar.textContent = '✓ Copiado!';
          setTimeout(() => { btnCopiar.textContent = '📋 Copiar'; }, 2000);
        }).catch(() => {
          output.select();
          document.execCommand('copy');
          btnCopiar.textContent = '✓ Copiado!';
          setTimeout(() => { btnCopiar.textContent = '📋 Copiar'; }, 2000);
        });
      });
    }

    // ===== Boot =====
    (async function boot() {
      await loadFromStorage();
      const todayEl = document.getElementById('today');
      if (todayEl) todayEl.textContent = fmtDate(new Date());
      updateCadCount();

      // Resetar contador de refresh se não estiver na view de consulta
      const start = (location.hash || '').replace('#', '') || 'dashboard';
      if (start !== 'consulta') {
        state.consultaRefreshCount = 0;
        await saveToStorage();
      }

      go(start);
    })();
  </script>
